<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APPROVED</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

.card{
    text-align:center;
    padding:60px 80px;
    border:4px solid #00ff88;
    border-radius:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(0,255,136,.45);
    animation:pop .8s ease;
}

h1{
    color:#00ff88;
    font-size:80px;
    letter-spacing:8px;
    text-shadow:0 0 25px #00ff88;
}

p{
    color:white;
    font-size:28px;
    margin-top:20px;
}

.check{
    font-size:90px;
    margin-bottom:20px;
    animation:bounce 1.6s infinite;
}

@keyframes pop{
    from{
        transform:scale(.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}
</style>

</head>
<body>

<div class="card">
    <div class="check">✅</div>
    <h1>APPROVED</h1>
    <p>Access Granted</p>
</div>

</body>
</html>
